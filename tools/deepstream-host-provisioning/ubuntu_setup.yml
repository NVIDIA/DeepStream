---
- name: Install Deepstream Dependencies
  hosts: all
  gather_facts: true
  become: yes
  vars_files:
    - defaults/main.yml
  vars:
    cuda_version_prod: "{{cuda_version}}"
    cuda_version_arr: "{{ cuda_version_prod.split('-') }}"
    cuda_major_version: "{{ cuda_version_arr[0] | int }}"
    cuda_dot_version_prod : "{{ cuda_version_prod | replace('-','.') }}"
    nv_driver_prod: "{{ nv_driver_version }}"
    trt_version_prod : "{{ trt_version }}"
    trt_sub_version_prod: "{{ trt_sub_version }}"
    cudnn_version_prod : "{{ cudnn_version }}"
    cudnn_sub_version_prod: "{{ cudnn_sub_version }}"

  pre_tasks:
    - name: Assert Ubuntu 24.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version("24.04", ">=") and ansible_distribution_version is version("25.00", "<")
        fail_msg: "This playbook requires Ubuntu 24.04. Detected: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  roles:
    - init
    - cuda
    - nv_display_driver
    - nvidia-docker
    - cudnn
    - tensorrt
    - deepstream-deps

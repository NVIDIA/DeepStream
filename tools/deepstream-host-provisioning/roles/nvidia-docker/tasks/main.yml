---
- name: Installing Docker 1
  apt:
    name: docker.io
    state: present
    update_cache: yes
  become: "yes"

- name: Installing Docker 2
  shell: "systemctl start docker && systemctl enable docker"
  become: "yes"

- name: Download NVIDIA GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /tmp/nvidia-gpgkey
    mode: '0644'
    checksum: "sha256:{{ nvidia_gpg_key_sha256 }}"

- name: Add NVIDIA GPG key to keyring
  ansible.builtin.apt_key:
    file: /tmp/nvidia-gpgkey
    state: present
    keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  become: yes

- name: Download NVIDIA repository list
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list
    dest: /tmp/nvidia-container-toolkit.list
    mode: '0644'

- name: Modify repository list to use the saved keyring
  ansible.builtin.replace:
    path: /tmp/nvidia-container-toolkit.list
    regexp: 'deb https://'
    replace: 'deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://'

- name: Save modified repository list to sources.list.d
  ansible.builtin.copy:
    src: /tmp/nvidia-container-toolkit.list
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    mode: '0644'
    remote_src: yes

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install nvidia docker
  apt:
    name:
      - nvidia-docker2
      - nvidia-container-toolkit
    state: present
    update_cache: "yes"
  become: "yes"

- name: docker runtime configuration
  command: nvidia-ctk runtime configure
  become: "yes"

- name: add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: true


- name: restart the dockerd daemon
  become_user: "root"
  become: true
  become_method: sudo
  ansible.builtin.service:
    name: docker
    state: restarted
---
- name : Printing Package versions
  debug:
    msg: "Nvidia Driver version {{nv_driver_prod}}, Cuda version {{cuda_version_prod}}, TensorRT version {{trt_version_prod}}={{trt_sub_version_prod}} CuDNN Version {{cudnn_version_prod}}={{cudnn_sub_version_prod}}"

- name: Ubuntu version
  shell: "echo {{ansible_distribution |lower }}{{ ansible_distribution_version.split('.')[0] }}"
  become: "yes"
  register: ubuntu_release

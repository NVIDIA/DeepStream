---
- name: Format cuDNN sub-version into apt version pin
  set_fact:
    cudnn_sub_version_pin: "-cuda-{{ cuda_major_version }}={{ cudnn_sub_version_prod }}*"

- name: Install cuDNN headers
  apt:
    name: libcudnn{{ cudnn_version_prod }}-headers{{ cudnn_sub_version_pin }}
    state: present
    update_cache: yes
  become: yes

- name: Install cuDNN runtime and dev libraries
  apt:
    name:
      - libcudnn{{ cudnn_version_prod }}{{ cudnn_sub_version_pin }}
      - libcudnn{{ cudnn_version_prod }}-dev{{ cudnn_sub_version_pin }}
    state: present
    update_cache: yes
  become: yes

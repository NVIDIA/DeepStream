infer_config {
  unique_id: 1
  gpu_ids: [0]
  max_batch_size: 4 
  backend {
    triton {
      model_name: "mask2former"
      version: -1
      grpc {
        url: "127.0.0.1:10001"
      }
    }
  }

  preprocess {
    network_format: MEDIA_FORMAT_NONE
    tensor_order: TENSOR_ORDER_LINEAR
    tensor_name: "inputs"
    maintain_aspect_ratio: 0
    frame_scaling_hw: FRAME_SCALING_HW_GPU
    frame_scaling_filter: 1
    normalize {
      scale_factor: 0.017507
      channel_offsets: [123.675, 116.280, 103.53]
    }
  }

  postprocess {
    detection {
      per_class_params {
        key: 0
        value { pre_threshold: 0.8 }
      }
      num_detected_classes: 2
      custom_parse_bbox_func: "NvDsInferParseCustomMask2Former"
    }
  }

  custom_lib {
    path: "../../../post_processor/libnvds_infercustomparser_tao.so"
  }

  extra {
    copy_input_to_host_buffers: false
    output_buffer_pool_size: 2
  }
}
input_control {
  process_mode: PROCESS_MODE_FULL_FRAME
  operate_on_gie_id: -1
  interval: 0
}


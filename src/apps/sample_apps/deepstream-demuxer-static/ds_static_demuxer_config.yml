source:
  uri-list: file:///opt/nvidia/deepstream/deepstream/samples/streams/sample_1080p_h264.mp4
  ip-address: localhost
  port: 9010
  drop-pipeline-eos: 1
  live-source: 1
  max-batch-size: 20
  batched-push-timeout: 40000
  width: 720
  height: 480

# streammux:
#   batch-size: 10
#   batched-push-timeout: 40000

# GitHub info on config.yml
# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository#configuring-the-template-chooser
# Set to 'false' if you only want the templates to be used.
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability?
    url: https://github.com/NVIDIA/DeepStream/blob/main/SECURITY.md
    about: >
      Do not report security vulnerabilities through GitHub issues. Follow
      the disclosure process in SECURITY.md.
